<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULADORA TOTAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!DOCTYPE html>
<html lang="es">
    
</head>

<body>

    <div class="container">

    <img src="assets/image.png" alt="Producto">

    <div class="contenido">

        <h2>Notebook Gamer</h2>

        <p class="descripcion">
            Intel Core i7 - 16GB RAM - SSD 512GB
        </p>

        <p class="precio">
            Precio: $<span id="precio">960000</span>
        </p>

        <div class="botones">

            <button onclick="disminuir()">-</button>

            <span id="cantidad">1</span>

            <button onclick="aumentar()">+</button>

        </div>

        <p class="total">
            Total: $<span id="total">400000</span>
        </p>

    </div>

</div>

    <script src="script.js"></script>

</body>

</html>
</body>
</html>
